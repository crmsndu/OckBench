# OckBench - OpenAI
# Switch task by changing dataset_path and evaluator_type:
#   math:    data/OckBench_math.jsonl    + evaluator_type: math
#   coding:  data/OckBench_coding.jsonl  + evaluator_type: code
#   science: data/OckBench_science.jsonl + evaluator_type: science

dataset_path: data/OckBench_math.jsonl
dataset_name: OckBench_math
provider: chat_completion
model: gpt-5.2
# api_key: pass via CLI: --api-key $OPENAI_API_KEY
base_url: https://api.openai.com/v1
max_output_tokens: 128000
reasoning_effort: medium
concurrency: 10
timeout: 600
max_retries: 3
evaluator_type: math
